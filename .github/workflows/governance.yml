name: Governance

on:
  pull_request:
    branches:
      - develop
      - release
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test policy fixtures
        shell: pwsh
        run: ./scripts/validate-commit-policy.ps1 -TestFixtures

      - name: Validate PR commits, title, and route
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          $policy = @{
            BaseSha = $env:BASE_SHA
            HeadSha = $env:HEAD_SHA
            PullRequestTitle = $env:PR_TITLE
            BaseBranch = $env:BASE_BRANCH
            HeadBranch = $env:HEAD_BRANCH
          }
          ./scripts/validate-commit-policy.ps1 @policy

  pack-validation:
    name: pack validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate pack
        shell: pwsh
        run: ./scripts/validate-pack.ps1

  changes:
    name: changed paths
    runs-on: ubuntu-latest
    outputs:
      launcher: ${{ steps.paths.outputs.launcher }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect launcher changes
        id: paths
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $files = @(git diff --name-only "$env:BASE_SHA...$env:HEAD_SHA")
          $launcher = @($files | Where-Object {
            $_ -match '^(updater/|launcher-template/|installer/)' -or
            $_ -match '^scripts/(build-|test-updater\.ps1)'
          }).Count -gt 0
          $value = $launcher.ToString().ToLowerInvariant()
          "launcher=$value" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

  updater-tests:
    name: updater tests
    needs:
      - changes
    if: needs.changes.outputs.launcher == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Test updater
        shell: powershell
        run: ./scripts/test-updater.ps1 -JavaPath "$env:JAVA_HOME\bin\java.exe"

  gate:
    name: gate
    if: always()
    needs:
      - policy
      - pack-validation
      - changes
      - updater-tests
    runs-on: ubuntu-latest
    steps:
      - name: Require successful governance jobs
        shell: pwsh
        env:
          POLICY_RESULT: ${{ needs.policy.result }}
          PACK_RESULT: ${{ needs.pack-validation.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          UPDATER_RESULT: ${{ needs.updater-tests.result }}
        run: |
          $results = @(
            $env:POLICY_RESULT,
            $env:PACK_RESULT,
            $env:CHANGES_RESULT,
            $env:UPDATER_RESULT
          )
          $invalid = @($results | Where-Object { $_ -notin @('success', 'skipped') })
          if ($invalid.Count -gt 0) {
            throw "Governance dependency failed: $($invalid -join ', ')"
          }
          Write-Host 'Governance gate passed.'
