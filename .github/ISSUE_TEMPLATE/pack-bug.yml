name: Ошибка сборки или мода
description: Сообщить о воспроизводимой gameplay, mod или configuration проблеме
title: "[Pack bug]: "
labels:
  - "area:pack"
  - "type:bug"
body:
  - type: input
    id: launcher
    attributes:
      label: Версия launcher
      placeholder: v1.1.6-ely.3
    validations:
      required: true
  - type: input
    id: pack
    attributes:
      label: Дата последнего успешного обновления pack
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Запустить...
        2. Открыть...
        3. Получить...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое и фактическое поведение
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs или crash report
      description: Удалите username, tokens, server addresses и другие личные данные.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: Я удалил credentials, usernames, server addresses и другие личные данные
          required: true
